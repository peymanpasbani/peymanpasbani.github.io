   فقط ۸ روز داده واقعی — بدون برآورد یا داده ساخته‌شده برای ادامه ماه
============================================================ */
const ALL_DAYS_RAW = RAW_DAYS;

/* ============================================================
   موتور قیمت‌گذاری Zagros — تبدیل داده خام به تصمیم AI
   منطق: اگر امروز پرواز زاگرس واقعی داریم، آن قیمت را به‌عنوان
   "نرخ فعلی ثبت‌شده" در نظر می‌گیریم و پیشنهاد فردا را بر اساس
   فاصله از میانگین بازار + روند سرعت فروش تخمینی محاسبه می‌کنیم.
   برای روزهای بدون پرواز واقعی، میانگین بازار را به‌عنوان لنگر
   برای محاسبه‌ی نرخ پیشنهادی استفاده می‌کنیم.
============================================================ */
const COST_FLOOR = 6_800_000;
const CEILING = 19_500_000;
const MAX_DAILY_CHANGE = 14; // درصد

const DAYS = ALL_DAYS_RAW.map((d, i) => {
  const marketAvg = d.zagros
    ? Math.round(d.competitors.reduce((s, c) => s + c.price, 0) / d.competitors.length)
    : Math.round(d.competitors.reduce((s, c) => s + c.price, 0) / d.competitors.length);
  const marketMin = Math.min(...d.competitors.map((c) => c.price));
  const marketMax = Math.max(...d.competitors.map((c) => c.price));

  const ourCurrent = d.zagros ? d.zagros.price : null;
  const gapToMarketNow = ourCurrent ? Math.round(((ourCurrent - marketAvg) / marketAvg) * 1000) / 10 : null;

  // پروکسی تقاضا: هرچه فاصله بین کف و سقف بازار کمتر باشد یعنی رقابت فشرده‌تر و حساسیت بالاتر به قیمت
  const marketSpread = (marketMax - marketMin) / marketAvg;
  const competitionDensity = d.competitors.length; // تعداد رقیب فعال آن روز

  const dtd = Math.max(0, 8 - d.day); // روز باقی‌مانده تا پایان بازه ۸ روزه

  return { ...d, marketAvg, marketMin, marketMax, ourCurrent, gapToMarketNow, marketSpread, competitionDensity, dtd };
});

// محاسبه‌ی پیشنهاد هر روز — Max Daily Change نسبت به نرخ فعلی *همان روز* اعمال می‌شود
// (این دقیقاً تعریف Rule Engine در مستند است: «تغییر قیمت هر پرواز در هر روز نباید
// بیش از X٪ باشد» — یعنی نسبت به نرخ ثبت‌شده‌ی امروز، نه نسبت به پیشنهاد روز قبل)
DAYS.forEach((d, i) => {
  let rec, prevAnchor;

  if (d.ourCurrent) {
    const correction = -d.gapToMarketNow * 0.35; // اگر گران‌تریم کمی نزدیک‌تر شویم، اگر ارزان‌تریم کمی بالا بکشیم
    const target = d.ourCurrent * (1 + correction / 100);
    const maxUp = d.ourCurrent * (1 + MAX_DAILY_CHANGE / 100);
    const maxDown = d.ourCurrent * (1 - MAX_DAILY_CHANGE / 100);
    rec = Math.min(maxUp, Math.max(maxDown, target));
    prevAnchor = d.ourCurrent;
  } else {
    // بدون پرواز واقعی، حول میانگین بازار با کمی صرافه (Zagros معمولاً نزدیک میانگین تا کمی بالاتر قیمت می‌دهد)
    rec = d.marketAvg * 1.015;
    prevAnchor = i === 0 ? d.marketAvg : DAYS[i - 1].recPrice;
  }

  rec = Math.max(COST_FLOOR, Math.min(CEILING, rec));
  rec = Math.round(rec / 10000) * 10000;

  d.prevPrice = Math.round(prevAnchor / 10000) * 10000;
  d.recPrice = rec;
  d.deltaPct = Math.round(((d.recPrice - d.prevPrice) / d.prevPrice) * 1000) / 10;
  d.direction = d.deltaPct > 0.4 ? "up" : d.deltaPct < -0.4 ? "down" : "flat";
  d.gapToMarket = Math.round(((d.recPrice - d.marketAvg) / d.marketAvg) * 1000) / 10;

  // اطمینان مدل: بالاتر وقتی داده واقعی داریم، رقابت متراکم‌تر است و گپ حدی نیست
  let confidence = d.ourCurrent ? 84 : 68;
  confidence += Math.abs(d.gapToMarket) < 5 ? 6 : Math.abs(d.gapToMarket) > 15 ? -10 : 0;
  confidence += d.competitionDensity >= 5 ? 4 : -3;
  d.confidence = Math.max(48, Math.min(97, Math.round(confidence)));
  d.autoEligible = d.confidence >= 80 && Math.abs(d.deltaPct) <= MAX_DAILY_CHANGE;

  d.rulesApplied = [
    d.recPrice <= COST_FLOOR + 50000 ? "Price Floor اعمال شد" : null,
    d.recPrice >= CEILING - 50000 ? "Price Ceiling اعمال شد" : null,
    Math.abs(d.deltaPct) >= MAX_DAILY_CHANGE - 0.3 ? `Max Daily Change (${faNum(MAX_DAILY_CHANGE)}٪) کلمپ شد` : null,
    !d.ourCurrent ? "بدون پرواز ثبت‌شده زاگرس — نرخ بر مبنای میانگین بازار" : null,
  ].filter(Boolean);

  // روایت Agent — کاملاً مبتنی بر اعداد واقعی همان روز
  const bits = [];
  if (d.ourCurrent) {
    bits.push(
      d.gapToMarketNow > 2
        ? `نرخ فعلی زاگرس ${pct(Math.abs(d.gapToMarketNow))} بالاتر از میانگین ${faNum(d.competitionDensity)} رقیب فعال`
        : d.gapToMarketNow < -2
        ? `نرخ فعلی زاگرس ${pct(Math.abs(d.gapToMarketNow))} پایین‌تر از میانگین بازار`
        : `نرخ فعلی زاگرس تقریباً هم‌راستا با میانگین بازار`
    );
  } else {
    bits.push(`زاگرس پروازی برای این روز ثبت نکرده؛ پیشنهاد بر مبنای میانگین ${faNum(d.competitionDensity)} رقیب فعال است`);
  }
  bits.push(
    d.marketSpread > 0.15
      ? `پراکندگی قیمتی بازار بالاست (دامنه ${faPrice(d.marketMin)} تا ${faPrice(d.marketMax)} تومان)`
      : `قیمت رقبا به‌هم نزدیک و بازار فشرده است`
  );
  bits.push(`${faNum(d.dtd)} روز تا پایان این بازه ۸ روزه`);

  const verdict =
    d.direction === "up"
      ? `افزایش ${pct(Math.abs(d.deltaPct))} نسبت به نرخ مرجع پیشنهاد می‌شود.`
      : d.direction === "down"
      ? `کاهش ${pct(Math.abs(d.deltaPct))} برای هم‌راستا شدن با روند بازار و حفظ تقاضا پیشنهاد می‌شود.`
      : `نرخ فعلی تغییر معناداری نمی‌کند.`;

  d.narrative = `${bits.join("، ")}. ${verdict}`;
});

/* ============================================================
   SMALL VISUAL PRIMITIVES
============================================================ */
function ConfidenceRing({ value, size = 46 }) {
  const stroke = 4.5;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (value / 100) * c;
  const color = value >= 85 ? "#2BD9C9" : value >= 65 ? "#F2A93B" : "#FF6B6B";
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke} />
        <circle
          cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transition: "stroke-dashoffset .6s ease" }}
        />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontSize: 12, fontWeight: 800, color: "#EDF1F7", fontFamily: "var(--mono)" }}>{faNum(value)}</span>
      </div>
    </div>
  );
}

function Sparkline({ data, width = 280, height = 56, marketAvgData }) {
  const all = [...data, ...(marketAvgData || [])];
  const max = Math.max(...all);
  const min = Math.min(...all);
  const range = max - min || 1;
  const toPoints = (arr) =>
    arr.map((v, i) => {
      const x = (i / (arr.length - 1)) * width;
      const y = height - ((v - min) / range) * (height - 8) - 4;
      return `${x},${y}`;
    }).join(" ");

  return (
    <svg width={width} height={height} style={{ display: "block", overflow: "visible" }}>
      <defs>
        <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#F2A93B" stopOpacity="0.28" />
          <stop offset="100%" stopColor="#F2A93B" stopOpacity="0" />
        </linearGradient>
      </defs>
      {marketAvgData && (
        <polyline points={toPoints(marketAvgData)} fill="none" stroke="#7C8AA5" strokeWidth="1.5" strokeDasharray="3,4" opacity="0.7" />
      )}
      <polygon points={`0,${height} ${toPoints(data)} ${width},${height}`} fill="url(#fillGrad)" opacity="0.9" />
      <polyline points={toPoints(data)} fill="none" stroke="#F2A93B" strokeWidth="2.25" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function DirIcon({ dir, size = 13 }) {
  if (dir === "up") return <ArrowUpRight size={size} />;
  if (dir === "down") return <ArrowDownRight size={size} />;
  return <Minus size={size} />;
}

============================================================ */
function DayChip({ d, active, onClick }) {
  const dirColor = d.direction === "up" ? "#2BD9C9" : d.direction === "down" ? "#FF6B6B" : "#7C8AA5";
  return (
    <button className={`rod-chip ${active ? "rod-chip--active" : ""}`} onClick={onClick}>
      <span className="rod-chip-dow">{d.dow.slice(0, 1)}</span>
      <span className="rod-chip-day">{faNum(d.day)}</span>
      <span className="rod-chip-price">{faNum(Math.round(d.recPrice / 1000))}K</span>
      <span className="rod-chip-delta" style={{ color: dirColor }}>
        <DirIcon dir={d.direction} size={11} />
        {pct(Math.abs(d.deltaPct))}
      </span>
      {!d.zagros && <span className="rod-chip-noflight" title="بدون پرواز ثبت‌شده زاگرس" />}
      <span className={`rod-chip-conf ${d.confidence >= 85 ? "hi" : d.confidence >= 65 ? "mid" : "lo"}`} />
    </button>
  );
}

          </div>
        </div>
        {d.rulesApplied.length > 0 && (
          <div className="rod-rules">
            {d.rulesApplied.map((r, i) => (
              <span key={i} className="rod-rule-chip"><ShieldCheck size={11} />{r}</span>

      </div>

      {/* اقدام */}
      <div className="rod-action-row">
        <div className={`rod-auto-tag ${d.autoEligible ? "on" : "off"}`}>
          {d.autoEligible ? <ShieldCheck size={13} /> : <Clock size={13} />}
          {d.autoEligible ? "واجد ثبت خودکار" : "نیازمند تأیید انسانی"}
        </div>
        <div className="rod-actions">
          {status ? (
            <span className={`rod-decided rod-decided--${status}`}>

            </span>
          ) : (
            <>
              <button className="rod-btn rod-btn--reject" onClick={onReject}><X size={14} />رد</button>
              <button className="rod-btn rod-btn--approve" onClick={onApprove}><Check size={14} />تأیید و ثبت در پنل</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

.rod-action-row{ display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line); padding-top:16px; flex-wrap:wrap; gap:12px; }

.rod-auto-tag.on{ background:var(--teal-soft); color:var(--teal); }
.rod-auto-tag.off{ background:var(--surface-2); color:var(--muted); border:1px solid var(--line); }
.rod-actions{ display:flex; gap:10px; }
.rod-btn{ display:flex; align-items:center; gap:6px; border:none; border-radius:12px; padding:10px 18px; font-size:12.5px; font-weight:700; cursor:pointer; font-family:var(--font); }
.rod-btn--approve{ background:linear-gradient(135deg, var(--teal), #1fb8a8); color:#062722; }
.rod-btn--reject{ background:var(--surface-2); color:var(--muted); border:1px solid var(--line); }
.rod-decided{ display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; padding:10px 16px; border-radius:12px; }
.rod-decided--approve{ color:var(--teal); background:var(--teal-soft); }
.rod-decided--reject{ color:var(--muted); background:var(--surface-2); }

@media (max-width: 980px){
  .rod-shell{ flex-direction:column; }
  .rod-sidebar{ width:100%; flex-direction:row; align-items:center; overflow-x:auto; }
  .rod-nav{ flex-direction:row; }
  .rod-route-card{ display:none; }
  .rod-kpis{ grid-template-columns:repeat(2,1fr); }
  .rod-detail-stats{ grid-template-columns:repeat(2,1fr); }
  .rod-comp-name{ width:100px; }
}
`;
